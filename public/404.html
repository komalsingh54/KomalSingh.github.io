<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts /projects/my-slug into /?p=/projects/my-slug
      // so index.html can pick it up and let React Router handle it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname) +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
